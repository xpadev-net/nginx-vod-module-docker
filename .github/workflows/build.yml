name: Build Docker Image

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Docker Buildxのセットアップ
        uses: docker/setup-buildx-action@v3

      - name: バージョン情報を解決
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          NGINX_VERSION="$(curl -fsSL https://nginx.org/en/download.html | \
            awk 'match($0, /nginx-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz/, a) { print a[1]; exit }')"
          if [ -z "$NGINX_VERSION" ]; then
            echo "nginx version not found" >&2
            exit 1
          fi

          MODULE_REF="$(curl -fsSL https://api.github.com/repos/kaltura/nginx-vod-module/commits/main | jq -r '.sha // empty')"
          if [ -z "$MODULE_REF" ]; then
            MODULE_REF="$(curl -fsSL https://api.github.com/repos/kaltura/nginx-vod-module/commits/master | jq -r '.sha // empty')"
          fi
          if [ -z "$MODULE_REF" ]; then
            echo "nginx-vod-module ref not found" >&2
            exit 1
          fi

          MODULE_SHA="${MODULE_REF:0:7}"
          TAG="nginx-${NGINX_VERSION}-vod-${MODULE_SHA}"
          IMAGE_PATH="${REGISTRY}/${GITHUB_REPOSITORY,,}"

          echo "nginx_version=$NGINX_VERSION" >> "$GITHUB_OUTPUT"
          echo "module_ref=$MODULE_REF" >> "$GITHUB_OUTPUT"
          echo "module_short=$MODULE_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_path=$IMAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: GitHub Container Registryにログイン
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 対象イメージの存在確認
        id: check_image
        run: |
          set -euo pipefail
          TARGET="${{ steps.resolve.outputs.image_path }}:${{ steps.resolve.outputs.tag }}"
          if docker manifest inspect "$TARGET" > /dev/null 2>&1; then
            echo "Image exists: $TARGET"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Image does not exist: $TARGET"
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dockerイメージをビルドしてプッシュ
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.resolve.outputs.image_path }}:${{ steps.resolve.outputs.tag }}
            ${{ steps.resolve.outputs.image_path }}:latest
          labels: |
            org.opencontainers.image.title=nginx-vod-module-docker
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NGINX_VERSION=${{ steps.resolve.outputs.nginx_version }}
            NGX_VOD_REF=${{ steps.resolve.outputs.module_ref }}

      - name: スキップ
        if: steps.check_image.outputs.should_build == 'false'
        run: |
          echo "Target image already exists, skip build and push."
